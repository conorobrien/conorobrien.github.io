<h2>Reading</h2>
<p class="f4 mb-4 text-gray">A random selection of books that I've read recently</p>
<div class="d-flex flex-wrap gutter-condensed mb-4">
	{% assign books = site.data.books.read | sample: site.data.books.display %}
  {% for book in books %}
    <div class="col-12 col-sm-6 col-md-6 col-lg-6 col-xl-4 mb-3">
      {% include book-card.html %}
    </div>
  {% endfor %}
</div>
