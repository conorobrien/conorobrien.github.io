
{% if work.link %}
<a href="{{ work.url }}" class="github-component d-flex flex-column align-items-stretch position-relative height-full text-center border border-gray-light rounded-1 bg-white p-5">
  <div class="col">
    <img src="{{ work.image_url }}" style="max-width: 100%" class="mx-auto mb-auto" alt="{{ work.name }}">
  </div>
  <div class="col">
    <p class="f3 lh-condensed text-center link-gray-dark mb-0 mt-1">{{ work.name }}</p>
    {% if work.description %}
      <p class="f5 text-gray text-center mb-0 mt-1">{{ work.description }}</p>
    {% endif %}
  </div>
</a>
{% else %}
<div href="{{ work.url }}" class="github-component d-flex flex-column align-items-stretch position-relative height-full text-center border border-gray-light rounded-1 bg-white p-5">
  <div class="col">
    <img src="{{ work.image_url }}" style="max-width: 100%" class="mx-auto mb-auto" alt="{{ work.name }}">
  </div>
  <div class="col">
    <p class="f3 lh-condensed text-center link-gray-dark mb-0 mt-1">{{ work.name }}</p>
    {% if work.description %}
      <p class="f5 text-gray text-center mb-0 mt-1">{{ work.description }}</p>
    {% endif %}
  </div>
</div>
{% endif %}
