<div class="github-component d-flex flex-row align-items-stretch position-relative height-full text-center border border-gray-light rounded-1 bg-white p-5">
  <div class="col-4">
      <img src="{{ book.image_url }}" style="max-width: 100%" class="mx-auto rounded-1" alt="{{ book.title }}">
  </div>
  <div class="col-8">
    <p class="f3 lh-condensed mb-0 mt-1">{{ book.title }}</p>
    {% if book.author %}
      <p class="f5 text-gray mb-0 mt-1">{{ book.author }}</p>
    {% endif %}
  </div>
</div>
