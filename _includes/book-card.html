<div style="column-count: 2; column-fill: balance" class="github-component position-relative height-full text-center border border-gray-light rounded-1 bg-white p-5">
  <img src="{{ book.image_url }}" style="max-width: 100%; max-height:128px" class="mx-auto rounded-1 mb-3" alt="{{ book.title }}">

  <div style="display: block; width: 100%">
    <p class="f3 lh-condensed text-center mb-0 mt-1">{{ book.title }}</p>
    {% if book.author %}
      <p class="f5 text-gray text-center mb-0 mt-1">{{ book.author }}</p>
    {% endif %}
  </div>

</div>
