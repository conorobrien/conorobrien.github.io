layout: sidebar
style: dark

plugins:
  - jekyll-octicons
  - jekyll-github-metadata
  - jemoji

permalink: /:year/:month/:day/:title/

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
      type: "posts"
    values:
      layout: "post"

projects:
  sort_by: pushed
  # sort_by options:
  #   - pushed
  #   - stars
  limit: 9
  exclude:
    archived: false
    forks: true
    projects:
    # - repo-name

social_media:
  # behance: your_username
  # dribbble: your_username
  # facebook: your_username
  # hackerrank: your_username
  instagram: cobrien012
  # keybase: your_username
  linkedin: conoreobrien
  # mastodon: your_username
  # medium: your_username
  # stackoverflow: your_user_id
  # telegram: your_username
  # twitter: your_username
  # unsplash: your_username
  # vk: your_username
  # website: http://your_website_url
  # youtube: your_username

topics:
  - name: Julia
    web_url: https://github.com/JuliaLang/julia
    image_url: "/assets/JuliaLogo.png"

  - name: ROS
    web_url: https://github.com/ros/ros
    image_url: https://avatars3.githubusercontent.com/u/547448?s=200&v=4

books:
  - title: "The Panda's Thumb"
    author: "Stephen Jay Gould"
    image_url: /assets/The_Panda's_Thumb.jpg

collections:
  works:
    output: true